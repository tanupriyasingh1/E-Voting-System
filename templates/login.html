{% extends "base.html" %}

{% block title %}Login - E-Voting System{% endblock %}

{% block content %}
<div class="form-container glass">
    <h2>Voter Login</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="aadhar">Aadhar Number</label>
            <input type="text" id="aadhar" name="aadhar" class="form-control" required pattern="[0-9]{12}" placeholder="Enter 12-digit Aadhar">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter password">
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Login to Vote</button>
    </form>
    <p style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--secondary-color);">
        Not registered yet? <a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register here</a>
    </p>
</div>
{% endblock %}
